# .git-sync.yaml
#
# Place this file at the root of your project to declare external
# repository dependencies managed by git-sync.
#
# Each top-level key is a logical name for the dependency.
# The reserved _settings key holds global options.

# Global settings — apply to all repos unless overridden per-repo.
_settings:
  # Default prefix for auto-commit messages. {parent} expands to parent project name.
  # parent-commit-message: "[via {parent}]"

chart-lib:
  path: external/chart-lib
  git-repo: https://github.com/example/chart-lib.git
  mode: update-branch
  current-branch: main
  current-commit: abc1234def5678
  create-on-missing: true
  ensure-in-git-ignore: true
  # Auto-commit tracked file changes in this sub-repo
  # when snapshotting (e.g. during parent pre-commit hook)
  commit-tracked-files-on-parent-commit: false
  # Push the sub-repo after auto-committing
  push-after-auto-commit: false
  # Override the commit message prefix for this repo (optional).
  # {parent} expands to parent project name. Default: "[via {parent}]"
  # parent-commit-message: "[chart-lib sync]"

shared-config:
  path: vendor/shared-config
  git-repo: https://github.com/example/shared-config.git
  mode: checkout-commit
  current-branch: release-v2
  current-commit: v2.1.0
  create-on-missing: true
  ensure-in-git-ignore: true
  commit-tracked-files-on-parent-commit: false
  push-after-auto-commit: false

# Pull-only sparse checkout example:
# Syncs only the context-db/ folder from another repo.
# read-only: errors on dirty, skips snapshot.
# sparse-paths: only these paths are checked out (git sparse-checkout).
other-project-context:
  path: .git-sync-repos/other-project
  git-repo: https://github.com/example/other-project.git
  mode: update-branch
  current-branch: main
  current-commit: null
  create-on-missing: true
  ensure-in-git-ignore: true
  read-only: true
  sparse-paths:
    - context-db/
